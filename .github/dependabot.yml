# Dependabot configuration for Bristol Care Dashboard

version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # Tailwind CSS v4 is a breaking major upgrade requiring dedicated
      # migration (PostCSS, global CSS, config, plugins, design tokens,
      # dark mode, custom utilities, visual regression). See:
      # docs/maintenance/tailwind-upgrade-policy.md
      - dependency-name: "tailwindcss"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@tailwindcss/*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
